<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alltold.us</title>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; background: #0f172a; color: #e2e8f0; text-align: center; }
    h1 { font-size: clamp(2rem, 8vw, 5rem); margin: 0; letter-spacing: -0.02em; }
    p { color: #64748b; margin-top: 1rem; }
    .wave { display: inline-block; animation: wave 1.6s ease-in-out infinite; transform-origin: 70% 70%; }
    @keyframes wave { 0%,60%,100%{transform:rotate(0deg);} 10%,30%{transform:rotate(14deg);} 20%{transform:rotate(-8deg);} }
  </style>
</head>
<body>
  <div>
    <h1>Hello, World <span class="wave">👋</span></h1>
    <p>Served from alltold.us</p>
  </div>
</body>
</html>
